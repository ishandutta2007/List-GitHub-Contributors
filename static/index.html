<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Contributor Fetcher</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Contributor Fetcher</h1>
            <p class="subtitle">Analyze GitHub repositories and extract contributor data with ease.</p>
        </header>
        
        <div class="form-group vertical">
            <div class="input-wrapper">
                <textarea id="repos-input" rows="5" placeholder="owner/repo (e.g. psf/requests)&#10;one per line..." autocomplete="off"></textarea>
            </div>
            
            <div class="options-group">
                <label class="switch-label">
                    <input type="checkbox" id="append-mode">
                    <span class="label-text">Append to contributors.txt</span>
                </label>
            </div>

            <button id="fetch-btn">Fetch All Contributors</button>
        </div>

        <div id="status" class="status"></div>

        <div id="results-area" class="results-area"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
