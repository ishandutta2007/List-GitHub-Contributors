<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Contributor Fetcher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>GitHub Contributor Fetcher</h1>
        <p class="subtitle">Enter one repository per line (owner/repo) or leave blank for defaults</p>
        
        <div class="form-group vertical">
            <textarea id="repos-input" rows="5" placeholder="psf/requests&#10;encode/fastapi" autocomplete="off"></textarea>
            <button id="fetch-btn">Fetch All Contributors</button>
        </div>

        <div id="status" class="status"></div>

        <div id="results-area" class="results-area"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
