<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Contributor Fetcher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>GitHub Contributor Fetcher</h1>
        <p class="subtitle">Enter repository details or leave blank for defaults</p>
        
        <div class="form-group">
            <input type="text" id="owner" placeholder="Owner (e.g. ishandutta2007)" autocomplete="off">
            <input type="text" id="repo" placeholder="Repo (e.g. Top-AI-repos)" autocomplete="off">
            <button id="fetch-btn">Fetch Contributors</button>
        </div>

        <div id="status" class="status"></div>

        <div class="results-container">
            <div class="results-header">
                <span id="count">0</span> Contributors Found
            </div>
            <ul id="contributor-list"></ul>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
